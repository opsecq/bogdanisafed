<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bogdan Investigation</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top,#320000,#090909 50%,#000);
    font-family:'Orbitron',sans-serif;
    color:white;
}

.bg{
    position:fixed;
    inset:0;
    overflow:hidden;
}

.particle{
    position:absolute;
    width:4px;
    height:4px;
    background:red;
    border-radius:50%;
    animation:float 12s linear infinite;
    opacity:.6;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0);
    }
    to{
        transform:translateY(-20vh) scale(1);
    }
}

.card{
    position:relative;
    z-index:2;
    text-align:center;
    padding:60px;
    border-radius:30px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,0,0,.4);
    box-shadow:
        0 0 50px rgba(255,0,0,.25),
        inset 0 0 20px rgba(255,255,255,.05);
    max-width:900px;
}

.alert{
    font-size:1rem;
    color:#ff4d4d;
    letter-spacing:4px;
    margin-bottom:20px;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    50%{
        opacity:.4;
    }
}

h1{
    font-size:5rem;
    font-weight:900;
    line-height:1;
    text-shadow:
        0 0 20px #ff0000,
        0 0 40px #ff0000,
        0 0 80px #ff0000;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.04);
    }
}

.subtitle{
    margin-top:25px;
    font-size:1.2rem;
    color:#cfcfcf;
}

.stamp{
    margin-top:40px;
    display:inline-block;
    border:5px solid red;
    padding:15px 25px;
    transform:rotate(-8deg);
    font-size:1.4rem;
    color:red;
    box-shadow:0 0 20px rgba(255,0,0,.6);
}

.warning{
    margin-top:30px;
    color:#888;
    font-size:.9rem;
}
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="card">
    <div class="alert">⚠ CLASSIFIED INVESTIGATION ⚠</div>

    <h1>BOGDAN<br>IS A FED</h1>

    <div class="subtitle">
        Sources: Cleveland Police Department
    </div>

    <div class="stamp">
        CONFIRMED*
    </div>

    <div class="warning">
        *For safety purposes only.
    </div>
</div>

<script>
const bg = document.getElementById('bg');

for(let i=0;i<120;i++){
    const p=document.createElement('div');
    p.className='particle';

    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(6+Math.random()*12)+'s';
    p.style.animationDelay=Math.random()*10+'s';

    bg.appendChild(p);
}
</script>

</body>
</html>
